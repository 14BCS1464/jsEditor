<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React Online Editor 🚀</title>

  <!-- React & Babel -->
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Monaco Editor -->
  <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>

    <h1> <span class="gradient-text" id="editor-title">React Online Editor</span></h1>

    <div class="controls">
      <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; margin-bottom: 10px;">
        <button id="run" onclick="run()">▶️ Run</button>

        <button id="download" onclick="downloadCode()">🔄 Reset</button>
        <button id="format" onclick="formatCode()">✨ Format</button>
        <button id="download" onclick="downloadCode()">Downlaod</button>
        <button id="download" onclick="downloadCode()">Add</button>
      </div>
    </div>
  </header>

  <div class="container">




    <!-- <div class="panel-header">📝 Editor - App.tsx</div> -->
    <div id="editor"></div>

    <div class="preview-panel">
      <div class="panel-header">👁️ Live Preview</div>
      <iframe id="preview" sandbox="allow-scripts allow-same-origin"></iframe>

      <div class="console-container">
        <div class="console-header">
          <span>💻 Console</span>
          <button class="clear-btn" onclick="clearConsole()">Clear</button>
        </div>
        <div id="error"></div>
        <div id="console">> Ready to run your React code...</div>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-item">
      <span>TypeScript</span>
      <span>•</span>
      <span>React 18</span>
    </div>
    <div id="status-indicator" class="status-item ready">
      <span>● Ready</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
